kind = "web"
previewPath = "/"
title = "CareerLaunch"
version = "1.0.0"
id = "artifacts/career-launch"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19042

[services.development]
run = "pnpm --filter @workspace/career-launch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/career-launch", "run", "build" ]
publicDir = "artifacts/career-launch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19042"
BASE_PATH = "/"
